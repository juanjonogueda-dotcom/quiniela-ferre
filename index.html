<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mundial 2026</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<meta name="theme-color" content="#111111">
<meta name="description" content="Quiniela del Mundial 2026">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root {
  --bg:          #FFFFFF;
  --surface:     #F7F7F7;
  --ink:         #111111;
  --ink2:        #444444;
  --muted:       #888888;
  --border:      #E0E0E0;
  --border-lt:   #EFEFEF;
  --accent:      #111111;
  --gold:        #C9A227;
  --silver:      #888888;
  --bronze:      #B07040;
  --f:           'Inter', system-ui, -apple-system, sans-serif;
  --hh:          56px;
  --th:          44px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: none; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--f);
  font-size: 15px;
  line-height: 1.45;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}
#app {
  display: flex; flex-direction: column;
  min-height: 100dvh;
  width: 100%;
}

/* ── HEADER ──────────────────────────────── */
#hdr {
  position: sticky; top: 0; z-index: 100;
  height: var(--hh);
  background: var(--ink);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
}
.hdr-brand {
  display: flex; align-items: baseline; gap: 6px;
}
.hdr-wordmark {
  font-family: var(--f);
  font-weight: 800;
  font-size: 18px;
  letter-spacing: -0.02em;
  color: #fff;
  line-height: 1;
}
.hdr-yr {
  font-family: var(--f);
  font-weight: 400;
  font-size: 15px;
  color: rgba(255,255,255,0.4);
}
.hdr-user {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 12px; border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.15);
  cursor: pointer; transition: background 0.15s;
}
.hdr-user:hover { background: rgba(255,255,255,0.08); }
.hdr-udot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 0 1.5px rgba(255,255,255,0.3);
  transition: background 0.3s;
}
.hdr-uname {
  font-family: var(--f); font-size: 13px; font-weight: 500;
  color: #fff;
  max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.hdr-chv { color: rgba(255,255,255,0.35); font-size: 10px; margin-left: 1px; }

/* ── TABS ────────────────────────────────── */
#tabbar {
  position: sticky; top: var(--hh); z-index: 99;
  height: var(--th);
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: stretch;
  padding: 0 20px;
}
.tab {
  font-family: var(--f); font-size: 13px; font-weight: 600;
  color: var(--muted);
  background: none; border: none;
  border-bottom: 2px solid transparent;
  padding: 0 14px; cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
.tab:first-child { padding-left: 0; }
.tab.on { color: var(--ink); border-bottom-color: var(--ink); }
.tab:hover:not(.on) { color: var(--ink2); }

/* ── CONTENT AREA ────────────────────────── */
#content-area { display: flex; flex: 1; min-height: 0; }
#sidebar { display: none; }
#main { flex: 1; min-width: 0; }

/* ═══════════════════════════════════════════
   TABLA VIEW
═══════════════════════════════════════════ */
.t-head {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.t-head-left { flex: 1; min-width: 0; }
.t-title {
  font-family: var(--f);
  font-size: 28px; font-weight: 800;
  color: var(--ink); line-height: 1; letter-spacing: -0.03em;
}
.t-meta {
  font-family: var(--f); font-size: 12px; font-weight: 400;
  color: var(--muted); margin-top: 4px;
}
.t-share-btn {
  flex-shrink: 0;
  display: flex; align-items: center; gap: 6px;
  font-family: var(--f); font-size: 12px; font-weight: 600;
  color: var(--ink2); background: none;
  border: 1px solid var(--border); border-radius: 8px;
  padding: 6px 12px; cursor: pointer;
  transition: all 0.13s; white-space: nowrap;
  margin-bottom: 2px;
}
.t-share-btn:hover { background: var(--surface); border-color: var(--ink2); color: var(--ink); }
.t-share-btn:active { background: var(--border); }
.t-share-btn svg { flex-shrink: 0; }
.t-share-btn .share-label { display: inline; }

/* Chart */
.chart-wrap {
  padding: 18px 20px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.chart-title {
  font-family: var(--f); font-size: 11px; font-weight: 600;
  color: var(--muted); margin-bottom: 12px; letter-spacing: 0.04em;
  text-transform: uppercase;
}

/* Scoring rules */
.score-rules {
  margin: 20px 20px 0;
  padding: 16px 18px;
  border: 1px solid var(--border); border-radius: 8px;
  background: var(--surface);
}
.score-rules-title {
  font-family: var(--f); font-size: 13px; font-weight: 700;
  color: var(--ink); margin-bottom: 12px; letter-spacing: -0.01em;
}
.score-rule {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--f); font-size: 13px; color: var(--ink2);
  padding: 4px 0;
}
.score-rule-pts {
  margin-left: auto;
  font-family: var(--f); font-size: 12px; font-weight: 700;
  color: var(--muted);
}
.sr-badge {
  width: 22px; height: 22px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--f); font-size: 10px; font-weight: 700;
  flex-shrink: 0;
}
.sr-exact  { background: var(--ink); color: #fff; }
.sr-result { background: var(--muted); color: #fff; }
.sr-wrong  { border: 1px solid var(--border); color: var(--muted); }

/* Leaderboard */
.lb { padding-bottom: 60px; }

.lb-row {
  display: flex; align-items: center;
  padding: 13px 20px;
  gap: 14px;
  border-bottom: 1px solid var(--border-lt);
  cursor: pointer;
  transition: background 0.1s;
  user-select: none;
}
.lb-row:hover { background: var(--surface); }

.lb-rank-num {
  font-family: var(--f);
  font-size: 14px; font-weight: 700;
  color: var(--muted);
  min-width: 20px;
  text-align: center;
  flex-shrink: 0;
}
.lb-item:nth-child(1) .lb-rank-num { color: var(--gold); }
.lb-item:nth-child(2) .lb-rank-num { color: var(--silver); }
.lb-item:nth-child(3) .lb-rank-num { color: var(--bronze); }

.lb-name-col {
  flex: 1; min-width: 0;
}
.lb-name {
  font-family: var(--f);
  font-size: 16px; font-weight: 700;
  color: var(--ink); line-height: 1.2;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  letter-spacing: -0.01em;
}
.lb-bar-wrap {
  margin-top: 7px;
  height: 4px; border-radius: 2px;
  background: var(--border);
  overflow: hidden;
}
.lb-bar {
  height: 100%; border-radius: 2px;
  background: var(--ink);
  transition: width 0.4s ease;
}
.lb-item:nth-child(1) .lb-bar { background: var(--gold); }
.lb-item:nth-child(2) .lb-bar { background: var(--silver); }
.lb-item:nth-child(3) .lb-bar { background: var(--bronze); }

.lb-sub {
  margin-top: 4px;
  font-family: var(--f); font-size: 12px; font-weight: 400;
  color: var(--muted);
}

.lb-pts-col {
  display: flex; align-items: baseline; gap: 3px;
  flex-shrink: 0;
}
.lb-pts {
  font-family: var(--f);
  font-size: 22px; font-weight: 800;
  line-height: 1;
  color: var(--ink);
  letter-spacing: -0.02em;
}
.lb-pts-u {
  font-family: var(--f); font-size: 11px; font-weight: 500;
  color: var(--muted);
}

/* Expand panel */
.lb-exp {
  display: none;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px 18px;
  animation: expIn 0.17s ease;
}
.lb-exp.open { display: block; }
@keyframes expIn {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.exp-row {
  display: flex;
  border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
  margin-bottom: 10px;
}
.exp-cell {
  flex: 1; padding: 12px 8px; text-align: center;
  border-right: 1px solid var(--border);
}
.exp-cell:last-child { border-right: none; }
.exp-n {
  display: block;
  font-family: var(--f); font-size: 22px; font-weight: 800;
  color: var(--ink); line-height: 1; letter-spacing: -0.02em;
}
.exp-l {
  display: block;
  font-family: var(--f); font-size: 11px; font-weight: 500;
  color: var(--muted); margin-top: 4px;
}
.exp-foot {
  font-family: var(--f); font-size: 12px; color: var(--muted);
  text-align: center;
}

/* ═══════════════════════════════════════════
   PARTIDOS VIEW
═══════════════════════════════════════════ */
.p-ctrl {
  display: flex; align-items: center;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border-lt);
  flex-wrap: wrap;
  gap: 8px;
}
.p-view-toggle {
  display: flex;
  border: 1px solid var(--border); border-radius: 6px;
  overflow: hidden;
  flex-shrink: 0;
}
.p-vtab {
  font-family: var(--f); font-size: 12px; font-weight: 600;
  color: var(--muted); background: none; border: none;
  padding: 6px 12px; cursor: pointer;
  transition: all 0.12s;
  white-space: nowrap;
}
.p-vtab.on { background: var(--ink); color: #fff; }
.p-vtab:hover:not(.on) { color: var(--ink); }

.p-pills {
  display: flex; gap: 5px; overflow-x: auto;
  scrollbar-width: none; flex: 1;
}
.p-pills::-webkit-scrollbar { display: none; }
.p-pill {
  font-family: var(--f); font-size: 12px; font-weight: 500;
  color: var(--muted); background: none;
  border: 1px solid var(--border); border-radius: 20px;
  padding: 5px 11px; cursor: pointer; white-space: nowrap;
  flex-shrink: 0; transition: all 0.12s;
}
.p-pill.on { background: var(--ink); border-color: var(--ink); color: #fff; }
.p-pill:hover:not(.on) { border-color: var(--ink2); color: var(--ink2); }

/* Day heading */
.day-hdr {
  padding: 14px 20px 6px;
  font-family: var(--f); font-size: 12px; font-weight: 600;
  color: var(--muted);
}

/* Sticky header wrapper — partidos only */
.p-sticky-header {
  position: sticky;
  top: calc(var(--hh) + var(--th));
  z-index: 50;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
@media (min-width: 900px) {
  /* On desktop #main is the scroll container, sticky starts at its top */
  .p-sticky-header { top: 0; }
}

/* Day navigator (partidos only) */
.p-day-nav {
  display: flex; gap: 5px; overflow-x: auto;
  scrollbar-width: none;
  padding: 8px 20px;
}
.p-day-nav::-webkit-scrollbar { display: none; }
.p-day-btn {
  font-family: var(--f); font-size: 12px; font-weight: 500;
  color: var(--muted); background: none;
  border: 1px solid var(--border); border-radius: 20px;
  padding: 5px 11px; cursor: pointer; white-space: nowrap;
  flex-shrink: 0; transition: all 0.12s;
}
.p-day-btn.on { background: var(--ink); border-color: var(--ink); color: #fff; font-weight: 700; }
.p-day-btn:hover:not(.on) { border-color: var(--ink2); color: var(--ink2); }
.p-day-btn.today:not(.on) { border-color: var(--ink); color: var(--ink); }

/* Match row — Mi quiniela */
.m-row {
  display: flex; align-items: center;
  padding: 13px 20px; gap: 12px;
  border-bottom: 1px solid var(--border-lt);
  cursor: pointer; transition: background 0.1s;
}
.m-row:hover { background: var(--surface); }
.m-teams { flex: 1; min-width: 0; }
.m-name {
  font-family: var(--f); font-size: 16px; font-weight: 600;
  color: var(--ink); line-height: 1.3;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  letter-spacing: -0.01em;
}
.m-tag {
  font-family: var(--f); font-size: 12px; font-weight: 400;
  color: var(--muted); margin-top: 2px;
}
.m-right { flex-shrink: 0; text-align: right; min-width: 80px; }

.pred-score {
  font-family: var(--f); font-size: 20px; font-weight: 700;
  color: var(--ink); line-height: 1; letter-spacing: -0.02em;
}
.pred-score .sp { color: var(--muted); font-weight: 400; }
.pred-none {
  font-family: var(--f); font-size: 11px; font-weight: 500;
  color: var(--muted); background: var(--surface);
  border: 1px dashed var(--border); border-radius: 4px;
  padding: 3px 7px; white-space: nowrap;
}

.res-score {
  font-family: var(--f); font-size: 20px; font-weight: 700;
  color: var(--ink); line-height: 1; letter-spacing: -0.02em;
}
.res-score .sp { color: var(--muted); font-weight: 400; }
.res-sub {
  display: flex; align-items: center; justify-content: flex-end;
  gap: 5px; margin-top: 4px;
}
.res-pred { font-family: var(--f); font-size: 12px; color: var(--muted); }
.pts-dot {
  display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; border-radius: 50%;
  font-family: var(--f); font-size: 10px; font-weight: 700;
}
.pd-exact  { background: var(--ink); color: #fff; }
.pd-result { background: var(--muted); color: #fff; }
.pd-wrong  { border: 1px solid var(--border); color: var(--muted); }

/* Match block — Todos */
.m-all-block {
  border-bottom: 1px solid var(--border-lt);
}
.m-all-header {
  display: flex; align-items: center;
  padding: 13px 20px; gap: 12px;
  cursor: pointer; transition: background 0.1s;
}
.m-all-header:hover { background: var(--surface); }
.m-all-info { flex: 1; min-width: 0; }
.m-all-result {
  flex-shrink: 0; text-align: right;
}
.m-all-res-score {
  font-family: var(--f); font-size: 20px; font-weight: 700;
  color: var(--ink); letter-spacing: -0.02em;
}
.m-all-res-score .sp { color: var(--muted); font-weight: 400; }
.m-all-no-result {
  font-family: var(--f); font-size: 12px; font-weight: 500;
  color: var(--muted);
}

.m-all-preds {
  padding: 2px 20px 12px 54px;
  display: flex; flex-direction: column; gap: 5px;
}
.pred-row {
  display: flex; align-items: center; gap: 9px;
}
.pred-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.pred-who {
  font-family: var(--f); font-size: 13px; font-weight: 500;
  color: var(--ink2); flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.pred-val {
  font-family: var(--f); font-size: 14px; font-weight: 700;
  color: var(--ink); letter-spacing: -0.01em;
}
.pred-none-sm {
  font-family: var(--f); font-size: 12px; color: var(--border);
}
.pred-add-btn {
  font-family: var(--f); font-size: 12px; font-weight: 600;
  color: var(--ink2); background: none;
  border: 1px dashed var(--border); border-radius: 4px;
  padding: 5px 10px; cursor: pointer; transition: all 0.12s;
  align-self: flex-start; margin-top: 4px;
}
.pred-add-btn:hover { border-color: var(--ink); color: var(--ink); }

/* ═══════════════════════════════════════════
   ADMIN VIEW
═══════════════════════════════════════════ */
.adm-gate {
  max-width: 340px; margin: 32px auto; padding: 0 24px; text-align: center;
}
.adm-gate-icon { font-size: 28px; margin-bottom: 12px; }
.adm-gate-title {
  font-family: var(--f);
  font-size: 28px; font-weight: 800;
  color: var(--ink); margin-bottom: 6px; letter-spacing: -0.03em;
}
.adm-gate-sub {
  font-family: var(--f); font-size: 13px; color: var(--muted);
  line-height: 1.55; margin-bottom: 24px;
}
.adm-inp {
  width: 100%; padding: 13px 16px;
  border: 1px solid var(--border); border-radius: 6px;
  font-family: var(--f); font-size: 15px;
  color: var(--ink); background: var(--surface);
  outline: none; text-align: center;
  transition: border-color 0.14s;
}
.adm-inp:focus { border-color: var(--ink); }
.adm-err {
  font-family: var(--f); font-size: 12px;
  color: #B91C1C; margin-top: 6px; min-height: 18px;
}
.adm-go {
  width: 100%; margin-top: 10px; padding: 13px;
  background: var(--ink); color: #fff;
  border: none; border-radius: 6px;
  font-family: var(--f); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: opacity 0.14s;
}
.adm-go:hover { opacity: 0.82; }

.adm-hdr {
  padding: 18px 20px 14px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.adm-hdr-title {
  font-family: var(--f);
  font-size: 28px; font-weight: 800; color: var(--ink); letter-spacing: -0.03em;
}
.adm-relock {
  font-family: var(--f); font-size: 12px; font-weight: 600;
  color: var(--muted); background: none;
  border: 1px solid var(--border); border-radius: 20px;
  padding: 5px 12px; cursor: pointer;
}

.adm-row {
  display: flex; align-items: center; flex-wrap: wrap;
  padding: 11px 20px; gap: 8px;
  border-bottom: 1px solid var(--border-lt);
}
.adm-teams {
  width: 100%;
  font-family: var(--f); font-size: 16px; font-weight: 600;
  color: var(--ink);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.adm-right { margin-left: auto; display: flex; align-items: center; gap: 7px; }
.adm-score {
  width: 44px; height: 44px; padding: 0;
  border: 1px solid var(--border); border-radius: 6px;
  text-align: center;
  font-family: var(--f); font-size: 20px; font-weight: 700;
  color: var(--ink); background: var(--surface);
  outline: none; transition: border-color 0.14s;
  -moz-appearance: textfield;
}
.adm-score::-webkit-outer-spin-button, .adm-score::-webkit-inner-spin-button { -webkit-appearance: none; }
.adm-score:focus { border-color: var(--ink); }
.adm-score.set { border-color: var(--ink); }
.adm-dash { font-family: var(--f); font-size: 18px; color: var(--muted); }
.adm-save {
  padding: 8px 14px;
  background: var(--ink); color: #fff;
  border: none; border-radius: 6px;
  font-family: var(--f); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: opacity 0.13s; white-space: nowrap;
}
.adm-save:hover { opacity: 0.78; }
.adm-save.done { background: var(--muted); }
.adm-clr {
  padding: 8px 10px;
  background: none; border: 1px solid var(--border); border-radius: 6px;
  font-family: var(--f); font-size: 12px; color: var(--muted);
  cursor: pointer; transition: all 0.12s;
}
.adm-clr:hover { border-color: var(--ink2); color: var(--ink); }

.adm-users-sec {
  padding: 16px 20px 8px;
  border-bottom: 1px solid var(--border);
}
.adm-users-title {
  font-family: var(--f); font-size: 13px; font-weight: 700;
  color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase;
  margin-bottom: 10px;
}
.adm-user-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border-lt);
}
.adm-user-row:last-child { border-bottom: none; }
.adm-user-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.adm-user-name {
  font-family: var(--f); font-size: 15px; font-weight: 600;
  color: var(--ink); flex: 1;
}
.adm-del-user {
  padding: 5px 12px;
  background: none; border: 1px solid var(--border); border-radius: 6px;
  font-family: var(--f); font-size: 12px; font-weight: 600; color: var(--muted);
  cursor: pointer; transition: all 0.12s;
}
.adm-del-user:hover { border-color: #e53e3e; color: #e53e3e; }
.adm-users-empty {
  font-family: var(--f); font-size: 13px; color: var(--muted);
  padding: 8px 0;
}

/* ═══════════════════════════════════════════
   MODALS
═══════════════════════════════════════════ */
.modal-bg {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.45);
  display: flex; align-items: flex-end; justify-content: center;
  backdrop-filter: blur(4px);
  animation: bgIn 0.18s ease;
}
.modal-bg.hidden { display: none; }
@keyframes bgIn { from { opacity: 0; } to { opacity: 1; } }

.modal-sheet {
  width: 100%; max-width: 520px;
  background: var(--bg);
  border-radius: 14px 14px 0 0;
  max-height: 90dvh; overflow-y: auto;
  animation: shUp 0.22s cubic-bezier(0.32, 0.72, 0, 1);
  padding-bottom: env(safe-area-inset-bottom, 16px);
}
@keyframes shUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
.modal-pill {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--border); margin: 12px auto 0;
}
.modal-hd {
  padding: 16px 22px 14px;
  border-bottom: 1px solid var(--border-lt);
}
.modal-hd-title {
  font-family: var(--f); font-size: 18px; font-weight: 700;
  color: var(--ink); margin-bottom: 2px; letter-spacing: -0.01em;
}
.modal-hd-sub {
  font-family: var(--f); font-size: 12px; color: var(--muted);
}

/* User modal */
.um-row {
  display: flex; align-items: center; gap: 11px;
  padding: 14px 22px;
  border-bottom: 1px solid var(--border-lt);
  cursor: pointer; transition: background 0.1s;
}
.um-row:hover { background: var(--surface); }
.um-row.cur { background: var(--surface); }
.um-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.um-name {
  font-family: var(--f); font-size: 18px; font-weight: 600;
  color: var(--ink); flex: 1; letter-spacing: -0.01em;
}
.um-chk { color: var(--ink); font-size: 14px; }

.um-add {
  padding: 14px 22px 0;
  border-top: 1px solid var(--border);
}
.um-add-lbl {
  font-family: var(--f); font-size: 12px; font-weight: 600;
  color: var(--muted); margin-bottom: 8px;
}
.um-add-inp {
  width: 100%; padding: 11px 13px;
  border: 1px solid var(--border); border-radius: 6px;
  font-family: var(--f); font-size: 18px; font-weight: 600;
  color: var(--ink); background: var(--surface); outline: none;
  transition: border-color 0.14s; letter-spacing: -0.01em;
}
.um-add-inp:focus { border-color: var(--ink); }
.um-add-inp::placeholder { color: var(--border); }
.um-add-btn {
  width: 100%; margin-top: 8px; margin-bottom: 20px; padding: 12px;
  background: var(--ink); color: #fff;
  border: none; border-radius: 6px;
  font-family: var(--f); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: opacity 0.14s;
}
.um-add-btn:hover { opacity: 0.83; }

/* Prediction modal */
.pm-teams { padding: 20px 22px 16px; display: flex; flex-direction: column; gap: 16px; }
.pm-trow { display: flex; align-items: center; gap: 14px; }
.pm-tname {
  font-family: var(--f); font-size: 20px; font-weight: 700;
  color: var(--ink); flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  letter-spacing: -0.02em;
}
.pm-stepper {
  display: flex; align-items: center;
  border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
  flex-shrink: 0;
}
.pm-step {
  width: 42px; height: 54px;
  background: var(--surface); border: none;
  font-family: var(--f); font-size: 22px; font-weight: 400;
  color: var(--ink); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.1s;
}
.pm-step:hover { background: var(--border-lt); }
.pm-step:active { background: var(--border); }
.pm-num {
  width: 54px; height: 54px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--f); font-size: 32px; font-weight: 800;
  color: var(--ink); letter-spacing: -0.03em;
  border-left: 1px solid var(--border); border-right: 1px solid var(--border);
  background: var(--bg); user-select: none;
}
.pm-actions { padding: 0 22px 20px; display: flex; gap: 10px; }
.pm-cancel {
  flex: 1; padding: 13px;
  background: none; border: 1px solid var(--border); border-radius: 8px;
  font-family: var(--f); font-size: 13px; font-weight: 600;
  color: var(--muted);
  cursor: pointer; transition: all 0.13s;
}
.pm-cancel:hover { border-color: var(--ink2); color: var(--ink2); }
.pm-save {
  flex: 2; padding: 13px;
  background: var(--ink); border: 1px solid var(--ink); border-radius: 8px;
  font-family: var(--f); font-size: 13px; font-weight: 600;
  color: #fff;
  cursor: pointer; transition: opacity 0.13s;
}
.pm-save:hover { opacity: 0.83; }
.pm-del {
  flex: 1; padding: 13px;
  background: none; border: 1px solid #FECACA; border-radius: 8px;
  font-family: var(--f); font-size: 13px; font-weight: 600;
  color: #B91C1C; cursor: pointer; transition: all 0.13s;
}
.pm-del:hover { background: #FEF2F2; border-color: #B91C1C; }

/* Result block in pred modal */
.pm-res {
  margin: 0 22px 14px;
  padding: 20px; text-align: center;
  border: 1px solid var(--border-lt); border-radius: 8px;
  background: var(--surface);
}
.pm-res-lbl {
  font-family: var(--f); font-size: 11px; font-weight: 600;
  color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em;
}
.pm-res-score {
  font-family: var(--f);
  font-size: 52px; font-weight: 800;
  color: var(--ink); line-height: 1; letter-spacing: -0.05em;
}
.pm-pred-detail {
  margin-top: 14px; padding-top: 14px;
  border-top: 1px solid var(--border-lt);
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.pm-pred-who {
  font-family: var(--f); font-size: 12px; color: var(--muted);
}
.pm-pred-score {
  font-family: var(--f); font-size: 20px; font-weight: 700; color: var(--ink2);
  letter-spacing: -0.02em;
}
.pm-pts-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; border-radius: 50%;
  font-family: var(--f); font-size: 11px; font-weight: 700;
}

/* ── EMPTY STATES ─────────────────────────── */
.empty {
  padding: 60px 24px; text-align: center;
}
.empty-icon { font-size: 36px; margin-bottom: 14px; }
.empty-title {
  font-family: var(--f);
  font-size: 24px; font-weight: 800;
  color: var(--ink); margin-bottom: 6px; letter-spacing: -0.03em;
}
.empty-text {
  font-family: var(--f); font-size: 13px; color: var(--muted); line-height: 1.6;
}

/* ── TOAST ─────────────────────────────────── */
#toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(6px);
  background: var(--ink); color: #fff;
  font-family: var(--f); font-size: 13px; font-weight: 500;
  padding: 9px 18px; border-radius: 20px; z-index: 999;
  opacity: 0; pointer-events: none; white-space: nowrap;
  transition: opacity 0.2s, transform 0.2s;
}
#toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── SYNC DOT ─────────────────────────────── */
#sync-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: transparent;
  flex-shrink: 0; margin-left: 8px;
  transition: background 0.3s;
}
#sync-dot.syncing {
  background: #4ade80;
  animation: syncPulse 0.9s ease-in-out infinite;
}
@keyframes syncPulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.4; transform: scale(0.7); }
}

/* ── UTILITY ──────────────────────────────── */
.hidden { display: none !important; }

/* ── TABLET / SMALL DESKTOP ───────────────── */
@media (min-width: 580px) and (max-width: 899px) {
  body { background: #EBEBEB; }
  #app {
    max-width: 620px; margin: 0 auto;
    background: var(--bg);
    min-height: 100dvh;
    box-shadow: 0 0 60px rgba(0,0,0,0.10);
  }
}

/* ── DESKTOP: two-column layout ───────────── */
@media (min-width: 900px) {
  body { background: var(--bg); overflow: hidden; }
  #app {
    width: 100%; height: 100dvh; overflow: hidden;
    display: flex; flex-direction: column;
  }
  #hdr { flex-shrink: 0; }
  #tabbar { flex-shrink: 0; }
  #content-area {
    display: flex; flex: 1; overflow: hidden;
  }
  #sidebar {
    display: block;
    width: 360px; flex-shrink: 0;
    border-right: 1px solid var(--border);
    overflow-y: auto;
  }
  #main {
    flex: 1; min-width: 0;
    overflow-y: auto;
    min-height: unset;
  }
  #tab-tabla { display: none; }
  /* Sidebar tabla: compact layout */
  #sidebar .t-title { font-size: 24px; letter-spacing: -0.02em; }
  #sidebar .t-head { padding: 16px 16px 12px; }
  #sidebar .t-meta { font-size: 12px; margin-top: 4px; }
  #sidebar .t-share-btn { padding: 5px 8px; border-radius: 6px; gap: 0; }
  #sidebar .t-share-btn .share-label { display: none; }
  #sidebar .lb-row { padding: 12px 16px; }
  #sidebar .lb-name { font-size: 14px; }
  #sidebar .lb-pts { font-size: 18px; }
  #sidebar .lb-exp { padding: 10px 16px 14px; }
  #sidebar .exp-n { font-size: 18px; }
  #sidebar .exp-cell { padding: 10px 6px; }
  #sidebar .chart-wrap { padding: 14px 16px 10px; }
  #sidebar .score-rules { margin: 14px 16px 0; }
  #sidebar .lb { padding-bottom: 24px; }
  .p-pills { flex-wrap: wrap; overflow-x: visible; scrollbar-width: auto; }
  .p-pills::-webkit-scrollbar { display: block; height: 3px; }
  .p-pills::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .modal-bg { align-items: center; }
  .modal-sheet {
    border-radius: 14px; max-width: 480px;
    animation: shFade 0.18s ease;
  }
}
@keyframes shFade {
  from { opacity: 0; transform: scale(0.97); }
  to   { opacity: 1; transform: scale(1); }
}
@media (min-width: 1200px) {
  #sidebar { width: 400px; }
}
</style>
</head>

function oc(a,b){ return a>b?'H':a<b?'A':'D'; }

function mPts(mid, uid) {
  const r=S.results[mid], p=S.predictions[`${uid}_${mid}`];
  if(!r||!p) return -1;
  const [ra,rb,pa,pb]=[+r.g1,+r.g2,+p.g1,+p.g2];
  if([ra,rb,pa,pb].some(isNaN)) return 0;
  if(ra===pa&&rb===pb) return 5;
  if(oc(ra,rb)===oc(pa,pb)) return 2;
  return 0;
}

function uStats(uid) {
  let pts=0,ex=0,re=0,wr=0,pl=0,pd=0;
  MATCHES.forEach(m=>{
    const r=S.results[m.id], p=S.predictions[`${uid}_${m.id}`];
    if(p) pd++;
    if(r){ pl++; const x=mPts(m.id,uid);
      if(x===5){pts+=5;ex++;} else if(x===2){pts+=2;re++;} else if(x===0) wr++;
    }
  });
  return {pts,ex,re,wr,pl,pd};
}

function ranking() {
  return S.users
    .map(u=>({...u, st:uStats(u.id)}))
    .sort((a,b)=>b.st.pts-a.st.pts);
}

function getU(id){ return S.users.find(u=>u.id===id)||null; }
function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

/* ── CHART ───────────────────────────────── */
function renderChart(r) {
  if(!r.length) return '';
  const maxPts = Math.max(...r.map(u=>u.st.pts), 1);
  const ROW=28, PAD=8, LABEL=72, BAR_MAX=180, RIGHT=30;
  const W=LABEL+BAR_MAX+RIGHT+PAD*2;
  const H=r.length*ROW+PAD*2;

  const rows=r.map((u,i)=>{
    const y=PAD+i*ROW+ROW/2;
    const barTotal=maxPts>0?Math.round((u.st.pts/maxPts)*BAR_MAX):0;
    const exactPts=u.st.ex*5;
    const resPts=u.st.re*2;
    const totalUsed=exactPts+resPts;
    const barExact=totalUsed>0?Math.round((exactPts/totalUsed)*barTotal):0;
    const barRes=barTotal-barExact;
    const name=u.name.length>10?u.name.slice(0,9)+'…':u.name;
    const bx=PAD+LABEL;
    return `
      <circle cx="${PAD+6}" cy="${y}" r="4" fill="${u.color}"/>
      <text x="${PAD+14}" y="${y+4}" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#444">${name}</text>
      ${barExact>0?`<rect x="${bx}" y="${y-7}" width="${barExact}" height="14" rx="3" fill="#111"/>`:
        `<rect x="${bx}" y="${y-7}" width="${Math.max(barTotal,2)}" height="14" rx="3" fill="#E0E0E0"/>`}
      ${barRes>0?`<rect x="${bx+barExact}" y="${y-7}" width="${barRes}" height="14" rx="3" fill="#CCCCCC"/>`: ''}
      <text x="${bx+barTotal+6}" y="${y+4}" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="700" fill="#111">${u.st.pts}</text>`;
  }).join('');

  return `<div class="chart-wrap">
    <div class="chart-title">Puntos acumulados</div>
    <svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;overflow:visible">${rows}</svg>
    <div style="display:flex;gap:14px;margin-top:10px">
      <div style="display:flex;align-items:center;gap:5px;font-family:Inter,system-ui,sans-serif;font-size:11px;color:#888">
        <span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#111"></span> Exactos (+5)
      </div>
      <div style="display:flex;align-items:center;gap:5px;font-family:Inter,system-ui,sans-serif;font-size:11px;color:#888">
        <span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#CCC"></span> Resultado (+2)
      </div>
    </div>
  </div>`;
}

        <div class="adm-right">
          <input type="number" min="0" max="20" class="adm-score${done?' set':''}"
            data-mid="${m.id}" data-g="1" value="${v1}" placeholder="—">
          <span class="adm-dash">—</span>
          <input type="number" min="0" max="20" class="adm-score${done?' set':''}"
            data-mid="${m.id}" data-g="2" value="${v2}" placeholder="—">
          <button class="adm-save${done?' done':''}" data-mid="${m.id}">${done?'✓':'Guardar'}</button>
          ${done?`<button class="adm-clr" data-clr="${m.id}">✕</button>`:''}
        </div>
      </div>`;
    }).join('');
    return `<div><div class="day-hdr">${ds}</div>${rows}</div>`;
  }).join('');

  const usersSection = `
    <div class="adm-users-sec">
      <div class="adm-users-title">Jugadores</div>
      ${S.users.length
        ? S.users.map(u=>`
          <div class="adm-user-row">
            <div class="adm-user-dot" style="background:${u.color}"></div>
            <span class="adm-user-name">${u.name}</span>
            <button class="adm-del-user" data-del-uid="${u.id}">Eliminar</button>
          </div>`).join('')
        : `<div class="adm-users-empty">No hay jugadores.</div>`}
    </div>`;

  return `
    <div class="adm-hdr">
      <div class="adm-hdr-title">Resultados</div>
      <button class="adm-relock" id="adm-lock">Bloquear</button>
    </div>${usersSection}${secs}<div style="height:48px"></div>`;
}

/* ════════════════════════════════════════════
   MODALS
════════════════════════════════════════════ */
function openUM(){
  const list=document.getElementById('um-list');
  list.innerHTML=S.users.length
    ? S.users.map(u=>`
      <div class="um-row${u.id===S.cur?' cur':''}" data-su="${u.id}">
        <div class="um-dot" style="background:${u.color}"></div>
        <span class="um-name">${u.name}</span>
        ${u.id===S.cur?'<span class="um-chk">✓</span>':''}
      </div>`).join('')
    : `<div style="padding:20px 22px;font-family:var(--f);font-size:13px;color:var(--muted)">Aún no hay jugadores.</div>`;
  document.getElementById('um-inp').value='';
  document.getElementById('umodal').classList.remove('hidden');
}
function closeUM(){ document.getElementById('umodal').classList.add('hidden'); }

function openPM(mid){
  const m=MATCHES.find(x=>x.id===mid);
  if(!m) return;
  const uid=S.cur;
  if(!uid){ toast('Selecciona un jugador primero'); return; }
  const u=getU(uid);
  const r=S.results[mid], p=S.predictions[`${uid}_${mid}`];
  const d=new Date(m.date+'T12:00:00Z');
  const ds=d.toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long',timeZone:'UTC'});
  const tag=m.g?`Grupo ${m.g}`:(PH[m.ph]||m.ph);

  document.getElementById('pm-hd').innerHTML=`
    <div class="modal-hd-title">${m.t1} · ${m.t2}</div>
    <div class="modal-hd-sub">${ds} · ${tag}</div>`;

  if(r){
    S.pm={mid};
    const pts=mPts(mid,uid);
    let ptsTxt='';
    if(p){
      if(pts===5) ptsTxt='¡Exacto! +5';
      else if(pts===2) ptsTxt='Resultado +2';
      else ptsTxt='Sin puntos';
    }
    const bg=pts===5?'var(--ink)':pts===2?'var(--muted)':'transparent';
    const fg=pts===0?'var(--muted)':'#fff';
    const bdr=pts===0?'border:1px solid var(--border);':'';
    document.getElementById('pm-body').innerHTML=`
      <div class="pm-res">
        <div class="pm-res-lbl">Resultado</div>
        <div class="pm-res-score">${r.g1} — ${r.g2}</div>
        ${p?`<div class="pm-pred-detail">
          <span class="pm-pred-who">${u?u.name:'Tú'}</span>
          <span class="pm-pred-score">${p.g1}–${p.g2}</span>
          <span class="pm-pts-badge" style="background:${bg};color:${fg};${bdr}">${pts}</span>
          <span style="font-family:var(--f);font-size:12px;color:var(--muted)">${ptsTxt}</span>
        </div>`:
        `<div style="margin-top:12px;font-family:var(--f);font-size:13px;color:var(--muted)">Sin predicción</div>`}
      </div>
      <div class="pm-actions">
        ${p?`<button class="pm-del" id="pm-del">Eliminar</button>`:''}
        <button class="pm-save" id="pm-cls" style="${p?'':'flex:1'}">Cerrar</button>
      </div>`;
  } else {
    S.pm={mid, g1:p?+p.g1:0, g2:p?+p.g2:0};
    document.getElementById('pm-body').innerHTML=`
      <div class="pm-teams">
        <div class="pm-trow">
          <div class="pm-tname">${m.t1}</div>
          <div class="pm-stepper">
            <button class="pm-step" data-t="g1" data-d="-1">−</button>
            <div class="pm-num" id="pm-g1">${S.pm.g1}</div>
            <button class="pm-step" data-t="g1" data-d="1">+</button>
          </div>
        </div>
        <div class="pm-trow">
          <div class="pm-tname">${m.t2}</div>
          <div class="pm-stepper">
            <button class="pm-step" data-t="g2" data-d="-1">−</button>
            <div class="pm-num" id="pm-g2">${S.pm.g2}</div>
            <button class="pm-step" data-t="g2" data-d="1">+</button>
          </div>
        </div>
      </div>
      <div class="pm-actions">
        <button class="pm-cancel" id="pm-cls">Cancelar</button>
        ${p?`<button class="pm-del" id="pm-del">Eliminar</button>`:''}
        <button class="pm-save" id="pm-ok">${p?'Actualizar':'Guardar'}</button>
      </div>`;
  }
  document.getElementById('pmodal').classList.remove('hidden');
}
function closePM(){ document.getElementById('pmodal').classList.add('hidden'); S.pm=null; }

function shareTabla(){
  const el=document.getElementById('lb-export');
  if(!el) return;
  const btn=document.getElementById('share-btn');
  if(btn){ btn.style.display='none'; }
  html2canvas(el,{
    backgroundColor:'#ffffff',
    scale:2,
    useCORS:true,
    logging:false
  }).then(async canvas=>{
    if(btn){ btn.style.display=''; }
    const date=new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\//g,'-');
    const filename=`quiniela-mundial-${date}.png`;
    if(navigator.share && navigator.canShare){
      try{
        const blob=await new Promise(res=>canvas.toBlob(res,'image/png'));
        const file=new File([blob],filename,{type:'image/png'});
        if(navigator.canShare({files:[file]})){
          await navigator.share({files:[file],title:'Quiniela Mundial'});
          return;
        }
      }catch(err){
        if(err.name==='AbortError') return;
      }
    }
    const a=document.createElement('a');
    a.download=filename;
    a.href=canvas.toDataURL('image/png');
    a.click();
    toast('Imagen guardada');
  }).catch(()=>{
    if(btn){ btn.style.display=''; }
    toast('Error al generar imagen');
  });
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('on');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('on'),2400);
}

/* ════════════════════════════════════════════
   EVENTS
════════════════════════════════════════════ */
function _getScroller(){
  return isDesktop() ? document.getElementById('main') : window;
}

function scrollToDate(date){
  const el=document.querySelector(`[data-date="${date}"]`);
  if(!el) return;
  const sh=document.querySelector('.p-sticky-header');
  const shH=sh ? sh.offsetHeight : 0;
  if(isDesktop()){
    const main=document.getElementById('main');
    const mainRect=main.getBoundingClientRect();
    main.scrollTop=main.scrollTop+(el.getBoundingClientRect().top-mainRect.top)-shH;
  } else {
    const y=window.scrollY+el.getBoundingClientRect().top-56-44-shH;
    window.scrollTo({top:Math.max(0,y),behavior:'instant'});
  }
}

function scrollToToday(){
  const today=new Date().toISOString().slice(0,10);
  const all=[...document.querySelectorAll('[data-date]')];
  const el=all.find(e=>e.dataset.date>=today)||all[all.length-1]||null;
  if(el) scrollToDate(el.dataset.date);
}

let _dayListener=null, _dayListenerEl=null, _lastActiveDay=null;

function _updateActiveDay(){
  const blocks=[...document.querySelectorAll('[data-date]')];
  if(!blocks.length) return;
  const sh=document.querySelector('.p-sticky-header');
  const threshold=(sh ? sh.getBoundingClientRect().bottom : 110)+10;
  let activeDate=blocks[0].dataset.date;
  for(const b of blocks){
    if(b.getBoundingClientRect().top<=threshold) activeDate=b.dataset.date;
    else break;
  }
  if(activeDate===_lastActiveDay) return;
  _lastActiveDay=activeDate;
  document.querySelectorAll('.p-day-btn').forEach(b=>{
    b.classList.toggle('on',b.dataset.goto===activeDate);
  });
  const active=document.querySelector(`.p-day-btn[data-goto="${activeDate}"]`);
  if(active) active.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function _teardownDayNav(){
  if(_dayListener && _dayListenerEl){
    _dayListenerEl.removeEventListener('scroll',_dayListener);
    _dayListener=null; _dayListenerEl=null; _lastActiveDay=null;
  }
}

function setupDayNav(){
  _teardownDayNav();
  if(!document.querySelectorAll('[data-date]').length) return;
  _dayListener=_updateActiveDay;
  _dayListenerEl=_getScroller();
  _dayListenerEl.addEventListener('scroll',_dayListener,{passive:true});
}

document.getElementById('tabbar').addEventListener('click',e=>{
  const b=e.target.closest('.tab');
  if(!b) return;
  S.view=b.dataset.v;
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x.dataset.v===S.view));
  render();
  if(S.view==='partidos'){ scrollToToday(); setupDayNav(); }
  else _teardownDayNav();
});

document.getElementById('ubtn').addEventListener('click', openUM);

document.getElementById('sidebar').addEventListener('click',e=>{
  if(e.target.closest('#share-btn')){ shareTabla(); return; }
  const lbr=e.target.closest('.lb-row');
  if(lbr){ const id=lbr.dataset.uid; S.expUid=S.expUid===id?null:id; render(); return; }
});

document.getElementById('main').addEventListener('click',e=>{
  /* Share button */
  if(e.target.closest('#share-btn')){ shareTabla(); return; }

  /* Leaderboard expand */
  const lbr=e.target.closest('.lb-row');
  if(lbr){ const id=lbr.dataset.uid; S.expUid=S.expUid===id?null:id; render(); return; }

  /* Partidos filter pills */
  const pp=e.target.closest('.p-pill');
  if(pp){ S.predF=pp.dataset.pf; render(); scrollToToday(); setupDayNav(); return; }

  /* View mode toggle */
  const vt=e.target.closest('.p-vtab');
  if(vt){ S.viewMode=vt.dataset.vm; render(); scrollToToday(); setupDayNav(); return; }

  /* Day nav button */
  const db=e.target.closest('.p-day-btn');
  if(db){ scrollToDate(db.dataset.goto); return; }

  /* Match row — mi quiniela */
  const mr=e.target.closest('.m-row');
  if(mr){ openPM(mr.dataset.mid); return; }

  /* Match header — todos */
  const mah=e.target.closest('.m-all-header');
  if(mah){ openPM(mah.dataset.mid); return; }

  /* Add prediction button — todos */
  const ab=e.target.closest('.pred-add-btn');
  if(ab){ openPM(ab.dataset.mid); return; }

  /* Admin */
  if(e.target.id==='adm-ok'){
    const v=document.getElementById('adm-pass').value;
    if(v===S.adminPass){ S.adminOn=true; render(); }
    else { document.getElementById('adm-err').textContent='Contraseña incorrecta'; }
    return;
  }
  if(e.target.id==='adm-lock'){ S.adminOn=false; render(); return; }

  const sv=e.target.closest('.adm-save');
  if(sv){
    const mid=sv.dataset.mid;
    const i1=document.querySelector(`.adm-score[data-mid="${mid}"][data-g="1"]`);
    const i2=document.querySelector(`.adm-score[data-mid="${mid}"][data-g="2"]`);
    const g1=parseInt(i1?.value), g2=parseInt(i2?.value);
    if(isNaN(g1)||isNaN(g2)){ toast('Ingresa ambos marcadores'); return; }
    S.results[mid]={g1,g2}; persist(); render(); toast('Resultado guardado'); return;
  }
  const cl=e.target.closest('[data-clr]');
  if(cl){ delete S.results[cl.dataset.clr]; persist(); render(); toast('Resultado eliminado'); return; }

  const du=e.target.closest('[data-del-uid]');
  if(du){
    const uid=du.dataset.delUid;
    S.users=S.users.filter(u=>u.id!==uid);
    Object.keys(S.predictions).forEach(k=>{ if(k.startsWith(uid+'_')) delete S.predictions[k]; });
    if(S.cur===uid) S.cur=S.users[0]?.id||null;
    persist(); render(); toast('Jugador eliminado'); return;
  }
});

document.getElementById('umodal').addEventListener('click',e=>{
  if(e.target===e.currentTarget){ closeUM(); return; }
  const su=e.target.closest('[data-su]');
  if(su){ S.cur=su.dataset.su; closeUM(); render(); }
});

document.getElementById('um-btn').addEventListener('click',()=>{
  const inp=document.getElementById('um-inp');
  const name=inp.value.trim();
  if(!name) return;
  if(S.users.length>=16){ toast('Máximo 16 jugadores'); return; }
  const nu={id:genId(), name, color:COLORS[S.users.length%COLORS.length]};
  S.users.push(nu); S.cur=nu.id;
  persist(); closeUM(); render();
});

document.getElementById('pmodal').addEventListener('click',e=>{
  if(e.target===e.currentTarget){ closePM(); return; }
  if(e.target.id==='pm-cls'){ closePM(); return; }
  const step=e.target.closest('.pm-step');
  if(step&&S.pm){
    const t=step.dataset.t, dv=parseInt(step.dataset.d);
    S.pm[t]=Math.max(0,Math.min(20,S.pm[t]+dv));
    document.getElementById(`pm-${t}`).textContent=S.pm[t]; return;
  }
  if(e.target.id==='pm-del'&&S.pm){
    delete S.predictions[`${S.cur}_${S.pm.mid}`];
    persist(); closePM(); render(); toast('Predicción eliminada'); return;
  }
  if(e.target.id==='pm-ok'&&S.pm){
    S.predictions[`${S.cur}_${S.pm.mid}`]={g1:S.pm.g1,g2:S.pm.g2};
    persist(); closePM(); render(); toast('Predicción guardada'); return;
  }
});

document.addEventListener('keydown',e=>{
  if(e.key!=='Enter') return;
  if(e.target.id==='um-inp') document.getElementById('um-btn').click();
  if(e.target.id==='adm-pass') document.getElementById('adm-ok')?.click();
});

let _resizeT;
window.addEventListener('resize',()=>{
  clearTimeout(_resizeT);
  _resizeT=setTimeout(()=>{
    render();
    if(S.view==='partidos'){ setupDayNav(); }
  },150);
});

/* ════════════════════════════════════════════
   INIT
════════════════════════════════════════════ */
(async () => {
  await hydrate();
  _prevHash = JSON.stringify({ users:S.users, predictions:S.predictions, results:S.results, adminPass:S.adminPass });
  render();
  if(S.view==='partidos') setTimeout(()=>{ scrollToToday(); setupDayNav(); },50);
  if(!S.users.length) setTimeout(openUM, 250);
  setInterval(autoRefresh, 30000);
})();
</script>
